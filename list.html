<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>登録済み単語一覧 - Word Tooltip</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; font-size: 14px; color: #333; background: #f9f9f9; padding: 32px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 20px; margin-bottom: 20px; }
    .empty { color: #999; padding: 24px 0; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    th { background: #f5f5f5; text-align: left; padding: 10px 16px; font-size: 13px; color: #666; border-bottom: 1px solid #e0e0e0; }
    td { padding: 12px 16px; border-bottom: 1px solid #eee; vertical-align: top; }
    td.word { font-weight: bold; white-space: nowrap; width: 120px; }
    td.meaning { color: #555; line-height: 1.5; word-break: break-word; cursor: pointer; }
    td.meaning:hover { background: #f5f5f5; }
    td.meaning.editing { padding: 8px 12px; }
    td.meaning textarea { width: 100%; min-height: 60px; padding: 6px 8px; font-family: sans-serif; font-size: 13px; line-height: 1.5; border: 1px solid #4285f4; border-radius: 4px; resize: vertical; box-sizing: border-box; }
    .edit-actions { display: flex; gap: 6px; margin-top: 6px; }
    .edit-actions button { padding: 4px 12px; font-size: 12px; border: none; border-radius: 4px; cursor: pointer; }
    .btn-save { background: #4285f4; color: #fff; }
    .btn-save:hover { background: #3367d6; }
    .btn-cancel { background: #eee; color: #333; }
    .btn-cancel:hover { background: #ddd; }
    td.actions { width: 48px; text-align: center; }
    .del { background: none; border: none; color: #e44; cursor: pointer; font-size: 18px; }
    .del:hover { color: #c00; }
    tr:last-child td { border-bottom: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>登録済み単語一覧</h1>
    <div id="content"></div>
  </div>
  <script src="list.js"></script>
</body>
</html>
