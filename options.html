<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>設定 - Word Tooltip</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; font-size: 14px; color: #333; background: #f9f9f9; padding: 32px; }
    .container { max-width: 480px; margin: 0 auto; }
    h1 { font-size: 20px; margin-bottom: 20px; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); padding: 24px; }
    .form-row { margin-bottom: 16px; }
    .form-row label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
    .form-row input, .form-row select { width: 100%; padding: 8px 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
    .form-row input[type="password"] { font-family: monospace; }
    .hint { font-size: 12px; color: #888; margin-top: 4px; }
    .actions { display: flex; gap: 8px; justify-content: flex-end; }
    .actions button { padding: 8px 20px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; }
    .btn-save { background: #4285f4; color: #fff; }
    .btn-save:hover { background: #3367d6; }
    .status { margin-top: 12px; font-size: 13px; color: #4285f4; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>設定</h1>
    <div class="card">
      <div class="form-row">
        <label for="apiKey">Gemini API Key</label>
        <input id="apiKey" type="password" placeholder="AIza...">
        <p class="hint">単語登録時に意味を自動取得するために使用します。未設定でも手入力で利用できます。</p>
      </div>
      <div class="form-row">
        <label for="defaultDetailLevel">デフォルトの詳細度</label>
        <select id="defaultDetailLevel">
          <option value="short">簡潔（1〜2文）</option>
          <option value="medium">標準（3〜5文）</option>
          <option value="detailed">詳細（8〜10文）</option>
        </select>
      </div>
      <div class="actions">
        <button class="btn-save" id="save">保存</button>
      </div>
      <div class="status" id="status">保存しました</div>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
