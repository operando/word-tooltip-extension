<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 340px; padding: 16px; font-family: sans-serif; font-size: 14px; margin: 0; }
    h2 { margin: 0 0 14px; font-size: 16px; }
    .form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .form-row { display: flex; gap: 8px; align-items: center; }
    .form-row label { width: 40px; flex-shrink: 0; font-size: 13px; color: #555; }
    .form-row input { flex: 1; padding: 6px 8px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    .form button { align-self: flex-end; padding: 7px 20px; background: #4285f4; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .form button:hover { background: #3367d6; }
    .bottom-links { display: flex; gap: 8px; }
    .bottom-links button { flex: 1; padding: 8px; background: none; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 13px; color: #4285f4; text-align: center; }
    .bottom-links button:hover { background: #f5f5f5; }
  </style>
</head>
<body>
  <h2>Word Tooltip</h2>
  <div class="form">
    <div class="form-row">
      <label for="word">単語</label>
      <input id="word" placeholder="例: CVR">
    </div>
    <div class="form-row">
      <label for="meaning">意味</label>
      <input id="meaning" placeholder="例: コンバージョン率">
    </div>
    <button id="add">追加</button>
  </div>
  <div class="bottom-links">
    <button id="openList">単語一覧</button>
    <button id="openSettings">設定</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
