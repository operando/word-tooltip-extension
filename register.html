<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>単語を登録 - Word Tooltip</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; font-size: 14px; color: #333; background: #f9f9f9; padding: 32px; }
    .container { max-width: 480px; margin: 0 auto; }
    h1 { font-size: 20px; margin-bottom: 20px; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); padding: 24px; }
    .form-row { margin-bottom: 16px; }
    .form-row label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
    .form-row input, .form-row textarea { width: 100%; padding: 8px 10px; font-family: sans-serif; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
    .form-row textarea { min-height: 80px; resize: vertical; line-height: 1.5; }
    .form-row input:read-only { background: #f5f5f5; color: #666; }
    .actions { display: flex; gap: 8px; justify-content: flex-end; }
    .actions button { padding: 8px 20px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; }
    .btn-save { background: #4285f4; color: #fff; }
    .btn-save:hover { background: #3367d6; }
    .btn-cancel { background: #eee; color: #333; }
    .btn-cancel:hover { background: #ddd; }
    .done { text-align: center; padding: 24px 0; color: #4285f4; font-size: 16px; }
    .error { font-size: 12px; color: #e44; margin-top: 4px; }
    .detail-level { display: flex; gap: 0; margin-bottom: 16px; }
    .detail-level button { flex: 1; padding: 7px 0; font-size: 13px; border: 1px solid #ccc; background: #fff; color: #555; cursor: pointer; }
    .detail-level button:first-child { border-radius: 4px 0 0 4px; }
    .detail-level button:last-child { border-radius: 0 4px 4px 0; }
    .detail-level button:not(:first-child) { border-left: none; }
    .detail-level button.active { background: #4285f4; color: #fff; border-color: #4285f4; }
    .detail-level button.active + button { border-left-color: #4285f4; }
  </style>
</head>
<body>
  <div class="container">
    <h1>単語を登録</h1>
    <div class="card" id="form">
      <div class="form-row">
        <label for="word">単語</label>
        <input id="word" readonly>
      </div>
      <div class="form-row">
        <label>詳細度</label>
        <div class="detail-level" id="detailLevel">
          <button data-level="short" class="active">簡潔</button>
          <button data-level="medium">標準</button>
          <button data-level="detailed">詳細</button>
        </div>
      </div>
      <div class="form-row">
        <label for="meaning">意味</label>
        <textarea id="meaning" placeholder="意味を入力"></textarea>
        <p class="error" id="apiError" style="display:none;"></p>
      </div>
      <div class="actions">
        <button class="btn-cancel" id="cancel">キャンセル</button>
        <button class="btn-save" id="save">登録</button>
      </div>
    </div>
    <div class="done" id="done" style="display:none;">登録しました。このタブを閉じてください。</div>
  </div>
  <script src="gemini.js"></script>
  <script src="register.js"></script>
</body>
</html>
